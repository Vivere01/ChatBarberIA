services:
  chatbarber-web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: chatbarber-web
    restart: unless-stopped
    ports:
      - "3001:3000"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
    networks:
      - chatbarber-network

networks:
  chatbarber-network:
    driver: bridge
