services:
  db:
    image: postgres:15-alpine
    container_name: chatbarber-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: chatbarber
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - chatbarber-network

  chatbarber-web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: chatbarber-web
    restart: unless-stopped
    ports:
      - "3001:3000"
    depends_on:
      - db
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://postgres:admin@db:5432/chatbarber?schema=public
    networks:
      - chatbarber-network

networks:
  chatbarber-network:
    driver: bridge

volumes:
  postgres_data:
